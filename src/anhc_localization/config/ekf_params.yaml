ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    sensor_timeout: 0.1
    print_diagnostics: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Odometry source: fuse x, y, yaw, vx, vyaw
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 2
    odom0_differential: false
    odom0_relative: false

    # IMU source: fuse yaw, vyaw, ax
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  false, false]
    imu0_queue_size: 5
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

