# Node name must match online_async_launch.py (name='slam_toolbox').
slam_toolbox:
  ros__parameters:
    use_sim_time: true
    mode: mapping
    use_map_saver: false

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan

    # Sim+bridge: avoid MessageFilter starvation; defaults are too shallow.
    scan_queue_size: 120
    throttle_scans: 1

    use_scan_matching: true
    # More conservative matching in long corridors; barycenter can cause abrupt snaps.
    use_scan_barycenter: false
    minimum_travel_distance: 0.12
    minimum_travel_heading: 0.18
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # Stability-first mapping profile: disable loop closure to avoid sudden global map jumps
    # on low-texture office corridors. This trades long-run global consistency for smooth local map.
    do_loop_closing: false
    loop_search_maximum_distance: 8.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_covariance: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    resolution: 0.05
    map_update_interval: 0.35
    publish_period_sec: 1.0
    max_laser_range: 20.0
    minimum_laser_range: 0.1
    minimum_time_interval: 0.35

    # Slower map->odom TF (vs 0.02) reduces visible jitter when Fixed Frame is map; still fine for SLAM.
    transform_publish_period: 0.08
    transform_timeout: 1.0
    tf_buffer_duration: 60.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false
