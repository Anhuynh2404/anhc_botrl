anhc_global_planner:
  ros__parameters:
    use_sim_time: true
    algorithm: "astar"
    # map_server uses 0 / 100 / -1; global costmap uses lethal 100 and 1–99 inflation.
    obstacle_cost_threshold: 100
    path_smooth_data_weight: 0.65
    path_smooth_smooth_weight: 0.12
    path_smooth_min_waypoints: 5
    astar:
      weight: 1.0
      allow_diagonal: true
    dijkstra:
      allow_diagonal: true

anhc_path_follower:
  ros__parameters:
    use_sim_time: true
    max_linear_speed: 1.0
    min_linear_speed: 0.12
    max_angular_speed: 1.6
    lookahead_distance: 0.55
    goal_tolerance_m: 0.15
    curvature_slowdown_gain: 0.8
    rotate_in_place_angle_rad: 1.0
    rotate_in_place_angular_speed: 0.8
    max_linear_accel: 1.2
    max_angular_accel: 3.0
    path_lost_threshold: 0.85
    cmd_smoothing_alpha: 0.55
    angular_Kp: 1.2
    angular_Ki: 0.02
    angular_Kd: 0.08
    transform_timeout: 0.35
