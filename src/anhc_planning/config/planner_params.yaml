anhc_global_planner:
  ros__parameters:
    use_sim_time: true
    algorithm: "astar"
    # obstacle_cost_threshold options (matches banded costmap values):
    #   100 → robot passes through all cost zones (hugs walls)
    #    75 → robot avoids inscribed zone (cost≥75, ≤robot_radius+band_1)
    #    55 → robot avoids caution zone (cost≥55, recommended default — ≥band_2 clearance)
    #    35 → robot keeps large clearance (avoids mild zone, ≥band_3)
    #    15 → robot keeps maximum clearance (avoids all coloured cells)
    obstacle_cost_threshold: 55
    path_smooth_data_weight: 0.65
    path_smooth_smooth_weight: 0.12
    path_smooth_min_waypoints: 5
    astar:
      weight: 1.0
      allow_diagonal: true
    dijkstra:
      allow_diagonal: true
    rrt_star:
      max_iterations: 5000
      step_size: 0.3
      goal_sample_rate: 0.1
      search_radius: 1.0
    dstar_lite:
      allow_diagonal: true
    theta_star:
      allow_diagonal: true
    greedy_bfs:
      allow_diagonal: true
    jps:
      obstacle_threshold: 100
    prm:
      n_samples: 1000          # tăng để phủ map tốt hơn
      connection_radius: 2.0   # tăng để graph liên thông hơn

anhc_path_follower:
  ros__parameters:
    use_sim_time: true
    control_frequency: 20.0
    max_linear_speed: 1.0
    min_linear_speed: 0.12
    max_angular_speed: 1.6
    lookahead_distance: 0.55
    goal_tolerance_m: 0.15
    # Lower = less linear slowdown in curves (path follower uses this, not a hardcoded 0.5).
    curvature_slowdown_gain: 0.35
    rotate_in_place_angle_rad: 0.85
    rotate_in_place_angular_speed: 1.35
    max_linear_accel: 1.2
    max_angular_accel: 3.0
    # Localization error can exceed 0.85 m; too low → constant "path lost" and no motion.
    path_lost_threshold: 2.5
    cmd_smoothing_alpha: 0.75
    angular_Kp: 1.2
    angular_Ki: 0.02
    angular_Kd: 0.08
    transform_timeout: 0.55
