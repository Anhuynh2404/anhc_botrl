anhc_pointcloud_processor_node:
  ros__parameters:
    use_sim_time: true
    voxel_leaf_size: 0.05
    passthrough_min_z: -0.1
    passthrough_max_z: 2.0
    obstacle_min_z: 0.1
    obstacle_max_z: 1.5
    frame_id: lidar_link

anhc_obstacle_detector_node:
  ros__parameters:
    use_sim_time: true
    dbscan_eps: 0.5
    dbscan_min_samples: 5
    max_obstacle_height: 1.5
    marker_lifetime_sec: 0.5

anhc_camera_processor_node:
  ros__parameters:
    use_sim_time: true
    canny_low: 50
    canny_high: 150
    depth_obstacle_threshold: 1.5
    blur_kernel: 5
    startup_grace_sec: 3.0
    # Depth obstacle detection uses a centre ROI and counts pixels with depth
    # < depth_obstacle_threshold. Set this to 1 to emulate the legacy trigger
    # condition ("any close pixel triggers obstacle"), but note that legacy
    # equivalence also depends on the parameters below.
    depth_min_obstacle_pixels: 1
    # To match legacy behaviour more closely:
    # - exclude_ground_plane: false  (legacy checked the full ROI)
    # - min_valid_depth_m: 0.05      (legacy filtered out depths <= 0.05 m)
    exclude_ground_plane: true
    min_valid_depth_m: 0.0
