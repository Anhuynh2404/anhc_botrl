- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Raw scan (Gazebo frame_id). anhc_scan_frame_relay republishes as /scan → lidar_link.
- ros_topic_name: "/scan_gz"
  # Gazebo gpu_lidar plugin publishes LaserScan on "/lidar" (not "/lidar/scan").
  gz_topic_name: "/lidar"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/point_cloud"
  gz_topic_name: "/lidar/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

- ros_topic_name: "/camera/image_raw"
  gz_topic_name: "/camera/image_raw"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/camera/depth"
  gz_topic_name: "/camera/depth"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/camera/camera_info"
  gz_topic_name: "/camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

- ros_topic_name: "/imu/data"
  gz_topic_name: "/imu/data"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/odom"
  gz_topic_name: "/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# ROS side gated by anhc_cmd_vel_idle_gate (zeros while no /cmd_vel traffic).
# GZ topic must match DiffDrive (default /model/<name>/cmd_vel); spawn name is anhc_bot in anhc_sim.launch.py.
- ros_topic_name: "/cmd_vel_gz"
  gz_topic_name: "/model/anhc_bot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ
  subscriber_queue: 50

# Do NOT bridge /tf bidirectionally: Gazebo's Pose_V tree conflicts with
# robot_state_publisher + gz-sim-diff-drive-system (odom→base_footprint).
# That duplicate TF causes LaserScan misalignment in RViz, broken SLAM maps,
# and apparent desync between RViz and simulation.
#
# cmd_vel: ROS topic is /cmd_vel_gz (fed by anhc_cmd_vel_idle_gate from /cmd_vel) because
# gz-sim8 DiffDrive does not implement cmd_vel_timeout — the last Twist is held forever.
